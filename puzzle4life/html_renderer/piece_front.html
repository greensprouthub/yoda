<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 1024px;
    background: #ffffff;
    font-family: 'Georgia', serif;
    overflow: hidden;
  }

  .canvas {
    position: relative;
    width: 1024px;
    height: 1024px;
  }

  /* SVG hex shape as clip path */
  .hex-clip {
    position: absolute;
    top: 0; left: 0;
    width: 1024px;
    height: 1024px;
  }

  .wood-base {
    position: absolute;
    top: 0; left: 0;
    width: 1024px;
    height: 1024px;
    background:
      /* wood grain texture via layered gradients */
      repeating-linear-gradient(
        92deg,
        transparent,
        transparent 18px,
        rgba(139,90,43,0.04) 18px,
        rgba(139,90,43,0.04) 19px
      ),
      repeating-linear-gradient(
        88deg,
        transparent,
        transparent 35px,
        rgba(160,100,40,0.03) 35px,
        rgba(160,100,40,0.03) 36px
      ),
      repeating-linear-gradient(
        91deg,
        transparent,
        transparent 55px,
        rgba(120,75,30,0.05) 55px,
        rgba(120,75,30,0.05) 56px
      ),
      linear-gradient(180deg, #F8E8C0 0%, #F2DFA8 40%, #EDD898 70%, #F5E6C8 100%);
  }

  .content {
    position: absolute;
    top: 0; left: 0;
    width: 1024px;
    height: 1024px;
    clip-path: url(#hexClip);
  }

  .wood-fill {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background:
      repeating-linear-gradient(
        92deg,
        transparent,
        transparent 18px,
        rgba(139,90,43,0.04) 18px,
        rgba(139,90,43,0.04) 19px
      ),
      repeating-linear-gradient(
        88deg,
        transparent,
        transparent 35px,
        rgba(160,100,40,0.03) 35px,
        rgba(160,100,40,0.03) 36px
      ),
      repeating-linear-gradient(
        91deg,
        transparent,
        transparent 55px,
        rgba(120,75,30,0.05) 55px,
        rgba(120,75,30,0.05) 56px
      ),
      linear-gradient(160deg, #F8E8C0 0%, #F0DB9E 35%, #EDD490 65%, #F5E2B8 100%);
  }

  /* V3 color version — swap this class on the wood-fill */
  .wood-fill.color-version {
    background: var(--theme-color);
  }

  .border-ring {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .text-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }

  .title {
    position: absolute;
    top: 155px;
    left: 50%;
    transform: translateX(-50%);
    width: 650px;
    text-align: center;
    font-size: 52px;
    font-weight: bold;
    color: #5C3D1E;
    line-height: 1.1;
    letter-spacing: -0.5px;
    text-shadow: 1px 1px 0px rgba(255,255,255,0.3);
  }

  .subtitle {
    position: absolute;
    top: 255px;
    left: 50%;
    transform: translateX(-50%);
    width: 620px;
    text-align: center;
    font-size: 28px;
    font-weight: normal;
    color: #7A4F2E;
    font-style: italic;
    line-height: 1.2;
  }

  .illustration {
    position: absolute;
    top: 340px;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 180px;
    filter: drop-shadow(2px 2px 4px rgba(92,61,30,0.3));
    opacity: 0.85;
  }

  /* V3 illustration — white tint */
  .illustration.color-version {
    filter: drop-shadow(2px 2px 6px rgba(0,0,0,0.4)) brightness(0) invert(1);
    opacity: 0.95;
  }

  .set-name {
    position: absolute;
    bottom: 140px;
    left: 130px;
    font-size: 22px;
    color: #7A4F2E;
    font-weight: normal;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .piece-number {
    position: absolute;
    bottom: 140px;
    right: 130px;
    font-size: 22px;
    color: #7A4F2E;
    font-weight: bold;
    letter-spacing: 1px;
  }

  /* V3 text overrides */
  .v3 .title,
  .v3 .subtitle,
  .v3 .set-name,
  .v3 .piece-number {
    color: #ffffff;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
  }

  /* Divider line under title */
  .title-divider {
    position: absolute;
    top: 305px;
    left: 50%;
    transform: translateX(-50%);
    width: 400px;
    height: 1px;
    background: rgba(92,61,30,0.3);
  }

  .v3 .title-divider {
    background: rgba(255,255,255,0.4);
  }

</style>
</head>
<body>

<!-- Inline SVG for clip path and border -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <clipPath id="hexClip" clipPathUnits="userSpaceOnUse">
      <!-- Flat-top hex ~420px radius, 512,512 center, with alternating tabs/slots -->
      <!-- Edge midpoints for flat-top hex at r=420:
           Top edge midpoint: (512, 92)  → TAB (protrudes up)
           Top-right: (876, 302) → SLOT (cuts in)
           Bottom-right: (876, 722) → TAB
           Bottom: (512, 932) → SLOT
           Bottom-left: (148, 722) → TAB
           Top-left: (148, 302) → SLOT
      -->
      <path d="
        M 512,72
        L 548,57 L 548,92 L 548,57

        M 512,72
        C 512,72 548,57 548,92
        L 548,57
        C 548,57 512,72 512,72

        M 880,272
        L 893,307 L 858,307 L 893,307

        M 148,272
        L 135,307 L 170,307 L 135,307
      " />
      <!-- Simplified clean hex with tabs/slots -->
      <path id="hexPath" d="
        M 480,75 L 544,75
        L 544,57 L 548,57 L 548,92 L 544,92 L 544,75

        M 480,75
        L 544,75 L 544,57 L 548,57 L 548,92 L 544,92 L 544,75
        L 880,272
        L 898,302 L 898,337 L 863,337 L 863,302 L 880,302
        L 880,722
        L 863,722 L 863,757 L 898,757 L 898,722 L 880,722
        L 544,932 L 544,949 L 480,949 L 480,932
        L 144,722 L 161,722 L 161,757 L 126,757 L 126,722 L 144,722
        L 144,302 L 126,302 L 126,337 L 161,337 L 161,302 L 144,302
        Z
      "/>
    </clipPath>
  </defs>
</svg>

<div class="canvas" id="pieceCanvas">

  <!-- Hex clipped content -->
  <div class="content" id="contentLayer">
    <div class="wood-fill" id="woodFill"></div>
  </div>

  <!-- SVG overlay for hex border + tabs/slots -->
  <svg class="hex-clip" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
    <!-- Flat-top hexagon with tabs and slots, drawn precisely -->
    <path id="hexOutline" d="
      M 480,75 L 544,75
      L 877,270
      L 877,305 L 912,305 L 912,340 L 877,340
      L 877,722
      L 912,722 L 912,757 L 877,757 L 877,722
      L 544,932 L 544,967 L 480,967 L 480,932
      L 147,757 L 147,722 L 112,722 L 112,757 L 147,757
      L 147,757 L 147,340 L 112,340 L 112,305 L 147,305 L 147,270
      Z
    "
    fill="none"
    stroke="#7A4F2E"
    stroke-width="4"
    opacity="0.7"
    />

    <!-- Inner border engraving -->
    <path d="
      M 490,100 L 534,100
      L 855,285
      L 855,322 L 888,322 L 888,323 L 855,323
      L 855,700
      L 888,700 L 888,736 L 855,736 L 855,701
      L 534,906 L 534,938 L 490,938 L 490,906
      L 169,736 L 169,700 L 136,700 L 136,736 L 169,736
      L 169,323 L 136,323 L 136,322 L 169,322 L 169,285
      Z
    "
    fill="none"
    stroke="#9A6B3E"
    stroke-width="2"
    opacity="0.5"
    />
  </svg>

  <!-- Text content layer (on top, clipped separately) -->
  <div class="text-layer" id="textLayer">
    <div class="title" id="titleEl">Start Your Tower</div>
    <div class="title-divider"></div>
    <div class="subtitle" id="subtitleEl">Turn scraps into garden gold</div>
    <div class="illustration" id="illustrationEl">🪱</div>
    <div class="set-name" id="setNameEl">Wormspire</div>
    <div class="piece-number" id="pieceNumEl">#18</div>
  </div>

</div>

</body>
</html>
